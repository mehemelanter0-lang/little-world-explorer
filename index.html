<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little World Explorer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#f5fbff;

color:#222;

}

header{

background:linear-gradient(135deg,#2D9CDB,#56CCF2);

color:white;

padding:20px 40px;

display:flex;

justify-content:space-between;

align-items:center;

}

.logo{

font-size:30px;

font-weight:bold;

}

nav a{

color:white;

text-decoration:none;

margin-left:20px;

font-weight:bold;

}

.hero{

height:85vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

background:linear-gradient(#dff6ff,#ffffff);

}

.hero h1{

font-size:60px;

margin-bottom:20px;

}

.hero p{

font-size:24px;

max-width:700px;

line-height:1.6;

margin-bottom:40px;

}

.button{

background:#2D9CDB;

padding:18px 40px;

border-radius:50px;

text-decoration:none;

color:white;

font-size:20px;

font-weight:bold;

transition:.3s;

}

.button:hover{

background:#1b78b5;

}

footer{

padding:40px;

background:#222;

color:white;

text-align:center;

}

</style>

</head>

<body>

<header>

<div class="logo">

🌍 Little World Explorer

</div>

<nav>

<a href="#">Home</a>

<a href="#">Books</a>

<a href="#">About</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<h1>

Discover The World

</h1>

<p>

Color • Learn • Explore

A global educational adventure for children.

</p>

<a class="button" href="#">

Explore Books

</a>

</section>

<footer>

© 2026 Little World Explorer

</footer>

</body>

</html>
